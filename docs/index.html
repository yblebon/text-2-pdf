<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Text to PDF Converter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script defer src="https://umami-livid-five.vercel.app/script.js" data-website-id="458b09c5-6c23-40b1-95c6-60832399b313"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:        #1a1917;
  --ink2:       #6b6860;
  --ink3:       #a8a49d;
  --paper:      #faf9f7;
  --surface:    #f3f1ed;
  --border:     #e2dfd8;
  --accent:     #2d5be3;
  --accent-bg:  #eef2fc;
  --danger:     #c44;
  --danger-bg:  #fdf0f0;
  --danger-bd:  #f5c6c6;
  --success:    #2a7a48;
  --success-bg: #eaf5ef;
  --success-bd: #b7ddc5;
  --radius:     6px;
  --mono:       'DM Mono', monospace;
  --sans:       'DM Sans', sans-serif;
  --serif:      'Instrument Serif', serif;
}

body { font-family: var(--sans); background: var(--surface); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; }

header {
  padding: 18px 28px; background: var(--paper); border-bottom: 1px solid var(--border);
  display: flex; align-items: baseline; gap: 12px; flex-shrink: 0;
}
header h1 { font-family: var(--serif); font-size: 22px; font-weight: 400; font-style: italic; letter-spacing: -0.01em; }
header span { font-family: var(--mono); font-size: 11px; color: var(--ink3); letter-spacing: 0.06em; text-transform: uppercase; }

.workspace { flex: 1; display: grid; grid-template-columns: 390px 1fr; min-height: 0; height: calc(100vh - 61px); }

/* ── LEFT PANEL ── */
.controls { background: var(--paper); border-right: 1px solid var(--border); overflow-y: auto; padding: 22px 22px 40px; display: flex; flex-direction: column; gap: 24px; }

.section-label {
  font-family: var(--mono); font-size: 10px; font-weight: 500; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--ink3); padding-bottom: 10px;
  border-bottom: 1px solid var(--border); margin-bottom: 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.toggle-btn { font-family: var(--mono); font-size: 10px; font-weight: 500; color: var(--ink3); background: none; border: none; cursor: pointer; padding: 0; letter-spacing: 0.06em; }
.toggle-btn:hover { color: var(--ink2); transform: none !important; }

.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 12px; font-weight: 500; color: var(--ink2); letter-spacing: 0.01em; }
.hint { font-weight: 400; color: var(--ink3); font-size: 11px; margin-left: 4px; }

.field input, .field textarea {
  font-family: var(--sans); font-size: 13.5px; color: var(--ink); background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 11px;
  transition: border-color .15s, box-shadow .15s; outline: none; width: 100%;
}
.field input:focus, .field textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
.field input.is-error { border-color: var(--danger); box-shadow: 0 0 0 3px var(--danger-bg); }
.field textarea { min-height: 130px; resize: vertical; line-height: 1.55; }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
input[type="number"] { appearance: textfield; -moz-appearance: textfield; }
input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

.msg { font-size: 11.5px; margin-top: 4px; display: none; }
.msg.visible { display: block; }
.msg.error   { color: var(--danger); }
.msg.success { color: var(--success); }

/* ── SPINNER ── */
.spinner { width: 12px; height: 12px; border: 1.5px solid var(--border); border-top-color: var(--ink3); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── STATUS PILLS ── */
.status-pill { font-family: var(--mono); font-size: 11px; padding: 8px 11px; border-radius: var(--radius); display: none; align-items: center; gap: 8px; }
.status-pill.loading { display: flex; color: var(--ink3); background: var(--surface); border: 1px solid var(--border); }
.status-pill.error   { display: flex; color: var(--danger); background: var(--danger-bg); border: 1px solid var(--danger-bd); }

/* ── CARD LIST ── */
.card-list { display: flex; flex-direction: column; gap: 6px; }

.item-card { display: flex; align-items: center; gap: 10px; padding: 9px 11px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); transition: border-color .15s, background .15s; width: 100%; font-family: var(--sans); text-align: left; }
.item-card.clickable { cursor: pointer; }
.item-card.clickable:hover { border-color: var(--accent); background: var(--accent-bg); }
.item-card.active          { border-color: var(--accent); background: var(--accent-bg); }
.item-card:active          { transform: none; }

.item-icon { flex-shrink: 0; width: 28px; height: 28px; background: var(--paper); border: 1px solid var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; }
.item-body { flex: 1; min-width: 0; }
.item-name { font-size: 13px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-meta { font-size: 11px; color: var(--ink3); font-family: var(--mono); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-badge { flex-shrink: 0; font-family: var(--mono); font-size: 9.5px; font-weight: 500; letter-spacing: 0.05em; color: var(--accent); background: var(--accent-bg); border: 1px solid #c5d4f8; border-radius: 4px; padding: 2px 6px; text-transform: uppercase; opacity: 0; transition: opacity .2s; }
.item-card.active .item-badge { opacity: 1; }

.icon-btn { flex-shrink: 0; background: none; border: 1px solid transparent; border-radius: 4px; padding: 4px 6px; cursor: pointer; color: var(--ink3); font-size: 13px; line-height: 1; transition: color .15s, border-color .15s, background .15s; }
.icon-btn:hover        { color: var(--ink2); border-color: var(--border); background: var(--paper); transform: none; }
.icon-btn.danger:hover { color: var(--danger); border-color: var(--danger-bd); background: var(--danger-bg); }

/* ── SAVE ROW ── */
.save-row { display: flex; gap: 8px; align-items: flex-end; }
.save-row .field { flex: 1; }
.save-btn { flex-shrink: 0; font-family: var(--sans); font-size: 12.5px; font-weight: 500; padding: 9px 14px; background: var(--surface); border: 1px solid var(--border); color: var(--ink2); border-radius: var(--radius); cursor: pointer; white-space: nowrap; transition: background .15s, color .15s; }
.save-btn:hover { background: var(--border); color: var(--ink); transform: none; }

/* ── OVERWRITE CONFIRM ── */
.overwrite-bar { background: #fff8ec; border: 1px solid #f0d080; border-radius: var(--radius); padding: 9px 12px; font-size: 12px; color: #7a5800; display: none; gap: 10px; align-items: center; }
.overwrite-bar.visible { display: flex; }
.overwrite-bar span { flex: 1; }
.overwrite-bar button { font-size: 12px; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-family: var(--sans); font-weight: 500; border: 1px solid; }
.overwrite-bar .ob-confirm { background: #7a5800; color: #fff; border-color: #7a5800; }
.overwrite-bar .ob-cancel  { background: #fff8ec; color: #7a5800; border-color: #f0d080; }
.overwrite-bar button:active { transform: none; }

/* ── ACTION BUTTONS ── */
.btn-group { display: flex; flex-direction: column; gap: 8px; }
button { font-family: var(--sans); font-size: 13.5px; font-weight: 500; border: none; border-radius: var(--radius); cursor: pointer; padding: 11px 16px; transition: background .15s, opacity .15s, transform .1s; }
button:active { transform: translateY(1px); }

#previewBtn  { background: var(--surface); border: 1px solid var(--border); color: var(--ink2); }
#previewBtn:hover  { background: var(--border); color: var(--ink); }
#exportJsonBtn { background: var(--surface); border: 1px solid var(--border); color: var(--ink2); }
#exportJsonBtn:hover { background: var(--border); color: var(--ink); }
#generatePdf { background: var(--accent); color: #fff; }
#generatePdf:hover { background: #234bc4; }
#generatePdf:disabled { opacity: .5; cursor: not-allowed; }

/* ── RIGHT PANEL ── */
.preview-panel { display: flex; flex-direction: column; overflow: hidden; background: #ccc9c0; }
.preview-toolbar { background: var(--paper); border-bottom: 1px solid var(--border); padding: 10px 18px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.preview-toolbar span { font-family: var(--mono); font-size: 10.5px; color: var(--ink3); letter-spacing: 0.06em; }
.preview-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); display: inline-block; margin-right: 6px; transition: background .3s; }
.preview-dot.live { background: #3c9e57; }
.preview-scroll { flex: 1; overflow-y: auto; padding: 28px 32px; display: flex; flex-direction: column; align-items: center; gap: 18px; }
.pdf-page-wrap { width: 100%; max-width: 680px; background: #fff; box-shadow: 0 4px 24px rgba(0,0,0,.18); border-radius: 2px; overflow: hidden; }
.pdf-page-wrap canvas { display: block; width: 100%; }
.preview-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: #8a8680; padding: 80px 0; }
.preview-empty svg { opacity: .35; }
.preview-empty p { font-size: 13px; font-family: var(--mono); letter-spacing: 0.04em; }

@media (max-width: 760px) {
  .workspace { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: auto; }
  .preview-panel { min-height: 400px; }
}
</style>
</head>
<body>

<header>
  <h1>Text to PDF</h1>
  <span>Converter</span>
</header>

<div class="workspace">
  <aside class="controls">

    <!-- ══ TEMPLATES ══ -->
    <div>
      <div class="section-label">
        Templates
        <button class="toggle-btn" id="tplToggle" onclick="toggleSection('tplBody','tplToggle')">hide</button>
      </div>
      <div id="tplBody" style="display:flex;flex-direction:column;gap:8px">
        <div class="status-pill loading" id="tplStatus">
          <span class="spinner"></span><span>Loading templates…</span>
        </div>
        <div class="card-list" id="tplList"></div>
      </div>
    </div>

    <!-- ══ SAVED DOCUMENTS ══ -->
    <div>
      <div class="section-label">
        Saved documents
        <button class="toggle-btn" id="savedToggle" onclick="toggleSection('savedBody','savedToggle')">hide</button>
      </div>
      <div id="savedBody" style="display:flex;flex-direction:column;gap:8px">
        <div class="save-row">
          <div class="field">
            <label for="saveName">Document name</label>
            <input id="saveName" type="text" placeholder="my-document" autocomplete="off" oninput="clearSaveMsg()">
          </div>
          <button class="save-btn" onclick="saveDocument()">Save</button>
        </div>
        <div class="overwrite-bar" id="overwriteBar">
          <span id="overwriteMsg"></span>
          <button class="ob-confirm" onclick="confirmOverwrite()">Overwrite</button>
          <button class="ob-cancel"  onclick="cancelOverwrite()">Cancel</button>
        </div>
        <div class="msg error"   id="saveError"></div>
        <div class="msg success" id="saveSuccess"></div>
        <div class="card-list"  id="savedList">
          <div class="empty-saved" style="font-size:12px;color:var(--ink3);font-family:var(--mono);padding:4px 2px">No saved documents yet.</div>
        </div>
      </div>
    </div>

    <!-- ══ METADATA ══ -->
    <div>
      <div class="section-label">Document metadata</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <div class="field">
          <label for="title">Filename</label>
          <input id="title" type="text" placeholder="my-document">
        </div>
        <div class="grid-2">
          <div class="field">
            <label for="author">Author</label>
            <input id="author" type="text" placeholder="Footer text">
          </div>
          <div class="field">
            <label for="keywords">Keywords</label>
            <input id="keywords" type="text" placeholder="tag1, tag2">
          </div>
        </div>
        <div class="field">
          <label for="subject">Subject / Heading</label>
          <input id="subject" type="text" placeholder="Large heading at top of page">
        </div>
      </div>
    </div>

    <!-- ══ CONTENT ══ -->
    <div>
      <div class="section-label">Content</div>
      <div class="field">
        <textarea id="textInput" placeholder="Enter your text here…"></textarea>
      </div>
    </div>

    <!-- ══ LAYOUT ══ -->
    <div>
      <div class="section-label">Layout</div>
      <div class="grid-2">
        <div class="field">
          <label for="leftMargin">Left margin (mm)</label>
          <input id="leftMargin" type="number" value="20" min="0" max="100">
        </div>
        <div class="field">
          <label for="rightMargin">Right margin (mm)</label>
          <input id="rightMargin" type="number" value="20" min="0" max="100">
        </div>
        <div class="field">
          <label for="topMargin">Top margin (mm)</label>
          <input id="topMargin" type="number" value="30" min="0" max="100">
        </div>
        <div class="field">
          <label for="fontSize">Font size (pt)</label>
          <input id="fontSize" type="number" value="12" min="6" max="24">
        </div>
      </div>
      <div id="marginError" class="msg error">Margins too large for page width (210 mm).</div>
    </div>

    <!-- ══ ACTIONS ══ -->
    <div class="btn-group">
      <button id="previewBtn"   onclick="runPreview()">↺ Refresh preview</button>
      <button id="exportJsonBtn" onclick="exportJson()">⤓ Export as JSON template</button>
      <button id="generatePdf"  onclick="generate()">↓ Download PDF</button>
    </div>

  </aside>

  <!-- ══ PREVIEW ══ -->
  <section class="preview-panel">
    <div class="preview-toolbar">
      <span><span class="preview-dot" id="liveDot"></span>Live preview</span>
      <span id="pageCount"></span>
    </div>
    <div class="preview-scroll" id="previewScroll">
      <div class="preview-empty" id="emptyState">
        <svg width="48" height="60" viewBox="0 0 48 60" fill="none">
          <rect x="4" y="4" width="36" height="48" rx="3" stroke="#8a8680" stroke-width="1.5"/>
          <path d="M12 20h20M12 28h20M12 36h12" stroke="#8a8680" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M32 4v10h12" stroke="#8a8680" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <p>Start typing to see a preview</p>
      </div>
    </div>
  </section>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   CONSTANTS
   ═══════════════════════════════════════════════════════════════ */
const TEMPLATES_URL  = 'https://static-conf.vercel.app/go/text-2-pdf';
const LS_PREFIX      = 'pdf_doc__';   /* localStorage key prefix */

/* All mapped fields with their defaults — used for full-reset on template/doc switch */
const FIELDS = {
  title:       { id: 'title',       default: '' },
  author:      { id: 'author',      default: '' },
  subject:     { id: 'subject',     default: '' },
  keywords:    { id: 'keywords',    default: '' },
  content:     { id: 'textInput',   default: '' },
  leftMargin:  { id: 'leftMargin',  default: '20' },
  rightMargin: { id: 'rightMargin', default: '20' },
  topMargin:   { id: 'topMargin',   default: '30' },
  fontSize:    { id: 'fontSize',    default: '12' },
};

/* ── helpers ── */
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function readForm() {
  const out = {};
  for (const [key, cfg] of Object.entries(FIELDS)) out[key] = document.getElementById(cfg.id).value;
  return out;
}

/* Resets every field to default, then overlays values from tpl */
function populateForm(tpl) {
  for (const [key, cfg] of Object.entries(FIELDS)) {
    const el = document.getElementById(cfg.id);
    if (!el) continue;
    el.value = (tpl[key] !== undefined && tpl[key] !== null) ? tpl[key] : cfg.default;
  }
}

function toggleSection(bodyId, btnId) {
  const body = document.getElementById(bodyId);
  const btn  = document.getElementById(btnId);
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'flex';
  btn.textContent    = open ? 'show' : 'hide';
}

/* ── icon helpers ── */
function docSvg() {
  return `<svg width="14" height="16" viewBox="0 0 14 16" fill="none">
    <rect x="1" y="1" width="9" height="12" rx="1.5" stroke="var(--ink3)" stroke-width="1.2"/>
    <path d="M3 5h5M3 7.5h5M3 10h3" stroke="var(--ink3)" stroke-width="1" stroke-linecap="round"/>
    <path d="M10 1v4h4" stroke="var(--ink3)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}
function saveSvg() {
  return `<svg width="14" height="14" viewBox="0 0 14 14" fill="none">
    <rect x="1" y="1" width="12" height="12" rx="2" stroke="var(--ink3)" stroke-width="1.2"/>
    <rect x="3" y="1" width="6" height="4" rx="0.5" stroke="var(--ink3)" stroke-width="1"/>
    <rect x="3" y="7" width="8" height="5" rx="0.5" stroke="var(--ink3)" stroke-width="1"/>
  </svg>`;
}

/* ═══════════════════════════════════════════════════════════════
   REMOTE TEMPLATES
   ═══════════════════════════════════════════════════════════════ */
function setTplStatus(type, msg) {
  const el = document.getElementById('tplStatus');
  if (!type) { el.style.display = 'none'; return; }
  el.className = 'status-pill ' + type;
  el.innerHTML = type === 'loading'
    ? `<span class="spinner"></span><span>${esc(msg)}</span>`
    : esc(msg);
  el.style.display = 'flex';
}

async function loadTemplates() {
  setTplStatus('loading', 'Loading templates…');
  try {
    const res = await fetch(TEMPLATES_URL);
    if (!res.ok) throw new Error(`Server returned ${res.status}.`);
    const data = await res.json();
    const list = Array.isArray(data) ? data : Array.isArray(data.templates) ? data.templates : null;
    if (!list || list.length === 0) { setTplStatus('error', 'No templates returned.'); return; }
    setTplStatus(null);
    renderTplList(list);
  } catch (err) {
    setTplStatus('error', `Could not load templates: ${err.message}`);
  }
}

function renderTplList(templates) {
  const list = document.getElementById('tplList');
  list.innerHTML = '';
  templates.forEach(tpl => {
    const name = tpl.name || tpl.title || 'Untitled';
    const desc = tpl.description || tpl.subject || '';
    const btn = document.createElement('button');
    btn.className = 'item-card clickable';
    btn.innerHTML = `
      <div class="item-icon">${docSvg()}</div>
      <div class="item-body">
        <div class="item-name">${esc(name)}</div>
        ${desc ? `<div class="item-meta">${esc(desc)}</div>` : ''}
      </div>
      <div class="item-badge">active</div>
    `;
    btn.addEventListener('click', () => applyRemoteTemplate(tpl, btn));
    list.appendChild(btn);
  });
}

async function applyRemoteTemplate(tpl, cardEl) {
  document.querySelectorAll('.item-card').forEach(c => c.classList.remove('active'));
  cardEl.classList.add('active');

  let data = tpl;
  if (tpl.url && Object.keys(tpl).length <= 3) {
    const metaEl = cardEl.querySelector('.item-meta') || cardEl.querySelector('.item-name');
    const orig = metaEl.textContent;
    metaEl.textContent = 'Loading…';
    try {
      const res = await fetch(tpl.url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      data = await res.json();
    } catch (err) {
      setTplStatus('error', `Failed to fetch template: ${err.message}`);
      cardEl.classList.remove('active');
      metaEl.textContent = orig;
      return;
    }
    metaEl.textContent = orig;
  }

  populateForm(data);   /* full reset then overlay */
  runPreview();
}

/* ═══════════════════════════════════════════════════════════════
   SAVED DOCUMENTS  (localStorage)
   ═══════════════════════════════════════════════════════════════ */
let pendingOverwriteName = null;

/* ── localStorage shim — all access goes through these three fns ── */
function lsSet(name, data)   { localStorage.setItem(LS_PREFIX + name, JSON.stringify(data)); }
function lsGet(name)         { const v = localStorage.getItem(LS_PREFIX + name); return v ? JSON.parse(v) : null; }
function lsDel(name)         { localStorage.removeItem(LS_PREFIX + name); }
function lsKeys()            {
  const keys = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith(LS_PREFIX)) keys.push(k.slice(LS_PREFIX.length));
  }
  return keys;
}

function clearSaveMsg() {
  document.getElementById('saveName').classList.remove('is-error');
  document.getElementById('saveError').classList.remove('visible');
  document.getElementById('saveSuccess').classList.remove('visible');
}
function showSaveError(msg)   { const el = document.getElementById('saveError');   document.getElementById('saveName').classList.add('is-error'); el.textContent = msg; el.classList.add('visible'); }
function showSaveSuccess(msg) { const el = document.getElementById('saveSuccess'); el.textContent = msg; el.classList.add('visible'); setTimeout(() => el.classList.remove('visible'), 3000); }

function saveDocument() {
  cancelOverwrite();
  clearSaveMsg();
  const rawName = document.getElementById('saveName').value.trim();
  if (!rawName) { showSaveError('Enter a name before saving.'); return; }
  const name = rawName.replace(/[^a-zA-Z0-9 _\-]/g, '').trim();
  if (!name)  { showSaveError('Name contains only invalid characters.'); return; }

  if (lsGet(name) !== null) {
    /* name already exists — ask for confirmation */
    pendingOverwriteName = name;
    document.getElementById('overwriteMsg').textContent = `"${name}" already exists.`;
    document.getElementById('overwriteBar').classList.add('visible');
    return;
  }
  persistDoc(name);
}

function confirmOverwrite() {
  cancelOverwrite();
  if (pendingOverwriteName) persistDoc(pendingOverwriteName);
  pendingOverwriteName = null;
}
function cancelOverwrite() {
  pendingOverwriteName = null;
  document.getElementById('overwriteBar').classList.remove('visible');
}

function persistDoc(name) {
  try {
    lsSet(name, { ...readForm(), savedAt: new Date().toISOString() });
    showSaveSuccess(`"${name}" saved.`);
    document.getElementById('saveName').value = '';
    refreshSavedList();
  } catch (err) {
    /* localStorage can throw if storage quota is exceeded */
    showSaveError(`Save failed: ${err.message}`);
  }
}

function refreshSavedList() {
  const container = document.getElementById('savedList');
  container.innerHTML = '';
  const names = lsKeys();
  if (names.length === 0) {
    container.innerHTML = '<div class="empty-saved" style="font-size:12px;color:var(--ink3);font-family:var(--mono);padding:4px 2px">No saved documents yet.</div>';
    return;
  }
  /* sort newest first */
  const entries = names
    .map(name => ({ name, data: lsGet(name) }))
    .filter(e => e.data)
    .sort((a, b) => (b.data.savedAt || '').localeCompare(a.data.savedAt || ''));

  entries.forEach(({ name, data }) => renderSavedCard(name, data, container));
}

function renderSavedCard(name, data, container) {
  const dateStr = data.savedAt
    ? new Date(data.savedAt).toLocaleDateString(undefined, { day:'numeric', month:'short', year:'numeric' })
    : '';
  const wrap = document.createElement('div');
  wrap.className = 'item-card';
  wrap.dataset.name = name;
  wrap.innerHTML = `
    <div class="item-icon">${saveSvg()}</div>
    <div class="item-body" style="cursor:pointer">
      <div class="item-name">${esc(name)}</div>
      ${dateStr ? `<div class="item-meta">${esc(dateStr)}</div>` : ''}
    </div>
    <button class="icon-btn" title="Load" data-action="load">↑</button>
    <button class="icon-btn danger" title="Delete" data-action="delete">✕</button>
  `;
  wrap.querySelector('[data-action="load"]').addEventListener('click',   () => loadSavedDoc(name, data, wrap));
  wrap.querySelector('[data-action="delete"]').addEventListener('click', () => deleteSavedDoc(name, wrap));
  wrap.querySelector('.item-body').addEventListener('click',              () => loadSavedDoc(name, data, wrap));
  container.appendChild(wrap);
}

function loadSavedDoc(name, data, cardEl) {
  document.querySelectorAll('.item-card').forEach(c => c.classList.remove('active'));
  cardEl.classList.add('active');
  populateForm(data);   /* full reset then overlay */
  runPreview();
}

function deleteSavedDoc(name, cardEl) {
  lsDel(name);
  cardEl.remove();
  if (!document.getElementById('savedList').querySelector('.item-card')) {
    document.getElementById('savedList').innerHTML =
      '<div class="empty-saved" style="font-size:12px;color:var(--ink3);font-family:var(--mono);padding:4px 2px">No saved documents yet.</div>';
  }
}

/* ═══════════════════════════════════════════════════════════════
   JSON TEMPLATE EXPORT
   ═══════════════════════════════════════════════════════════════ */
function exportJson() {
  const form = readForm();
  /* Build a clean template object — name comes from title, or prompt user */
  const tplName = form.title.trim() || 'template';
  const template = {
    name:        tplName,
    title:       form.title,
    author:      form.author,
    subject:     form.subject,
    keywords:    form.keywords,
    content:     form.content,
    leftMargin:  Number(form.leftMargin),
    rightMargin: Number(form.rightMargin),
    topMargin:   Number(form.topMargin),
    fontSize:    Number(form.fontSize),
  };
  /* Remove empty string fields (keeps template files lean) */
  for (const k of Object.keys(template)) {
    if (template[k] === '' || template[k] === null) delete template[k];
  }
  const blob = new Blob([JSON.stringify(template, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const safe = tplName.replace(/[\\/:*?"<>|]/g, '').replace(/\s+/g, '_').trim() || 'template';
  a.href     = url;
  a.download = safe + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

/* ═══════════════════════════════════════════════════════════════
   BUILD PDF
   ═══════════════════════════════════════════════════════════════ */
function buildDoc() {
  const { jsPDF } = window.jspdf;

  const title          = document.getElementById('title').value.trim();
  const author         = document.getElementById('author').value.trim();
  const subject        = document.getElementById('subject').value.trim();
  const keywords       = document.getElementById('keywords').value.trim();
  const text           = document.getElementById('textInput').value || '';
  const leftMargin     = Math.max(0, Number(document.getElementById('leftMargin').value)  || 20);
  const rightMargin    = Math.max(0, Number(document.getElementById('rightMargin').value) || 20);
  const topMarginInput = Math.max(0, Number(document.getElementById('topMargin').value)   || 30);
  const fontSize       = Math.min(24, Math.max(6, Number(document.getElementById('fontSize').value) || 12));

  const doc        = new jsPDF({ unit: 'mm', format: 'a4' });
  const pageWidth  = doc.internal.pageSize.getWidth();
  const pageHeight = doc.internal.pageSize.getHeight();

  const errEl = document.getElementById('marginError');
  if (leftMargin + rightMargin >= pageWidth - 10) { errEl.classList.add('visible'); return null; }
  errEl.classList.remove('visible');

  const usableWidth  = pageWidth - leftMargin - rightMargin;
  const lineHeight   = (fontSize * 1.15) * 0.352777778;
  const bottomMargin = 10;
  const footerOffset = 8;

  /* Set body font FIRST so splitTextToSize measures with the correct font/size */
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(fontSize);
  doc.setTextColor(0, 0, 0);

  /* Split body text with the correct font active */
  const rawLines = doc.splitTextToSize(text, usableWidth);

  /* Subject: switch to bold/larger font, split, then restore body font */
  const subjectFontSize   = subject ? Math.min(26, fontSize + 10) : 0;
  const subjectLineHeight = subjectFontSize ? (subjectFontSize * 1.15) * 0.352777778 : 0;
  let subjectLines = [];
  if (subject) {
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(subjectFontSize);
    subjectLines = doc.splitTextToSize(subject, usableWidth);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(fontSize);
  }
  const subjectHeight = subjectLines.length * subjectLineHeight;
  const extraGap      = subject ? 20 : 0;
  const topMargin     = topMarginInput + subjectHeight + extraGap;

  function drawSubject() {
    if (!subject) return;
    doc.setFontSize(subjectFontSize);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(0, 0, 0);
    let y = topMarginInput + subjectLineHeight * 0.8;
    for (const line of subjectLines) {
      /* Lines are already split to usableWidth — no maxWidth to avoid double-wrap */
      doc.text(line, leftMargin, y);
      y += subjectLineHeight;
    }
    doc.setFontSize(fontSize);
    doc.setFont('helvetica', 'normal');
  }

  function drawFooter(n, total) {
    const fSize = Math.min(fontSize, Math.max(6, fontSize - 1));
    doc.setFontSize(fSize);
    doc.setTextColor(120, 120, 120);
    const y = pageHeight - footerOffset;
    if (author) doc.text(author, leftMargin, y);
    const lbl = `${n} / ${total}`;
    doc.text(lbl, pageWidth - rightMargin - doc.getTextWidth(lbl), y);
    doc.setTextColor(0, 0, 0);
    doc.setFontSize(fontSize);
  }

  const props = {};
  if (title)    props.title    = title;
  if (subject)  props.subject  = subject;
  if (keywords) props.keywords = keywords;
  if (author)   props.author   = author;
  if (Object.keys(props).length) doc.setProperties(props);

  /* Font already set correctly above — restore to body font before rendering */
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(fontSize);
  doc.setTextColor(0, 0, 0);

  function countPages() {
    let n = 1, i = 0, first = true;
    while (i < rawLines.length) {
      let y = first ? topMargin : topMarginInput;
      while (i < rawLines.length && (y + lineHeight) <= (pageHeight - bottomMargin - footerOffset)) { y += lineHeight; i++; }
      if (i < rawLines.length) { n++; first = false; } else break;
    }
    return rawLines.length === 0 ? 1 : n;
  }

  const total = countPages();
  let idx = 0, pageNum = 1, firstPage = true;

  while (idx < rawLines.length) {
    if (firstPage) drawSubject();
    let y = firstPage ? topMargin : topMarginInput;
    while (idx < rawLines.length && (y + lineHeight) <= (pageHeight - bottomMargin - footerOffset)) {
      /* Lines are pre-split to usableWidth — no maxWidth to avoid double-wrap */
      doc.text(rawLines[idx], leftMargin, y);
      y += lineHeight;
      idx++;
    }
    drawFooter(pageNum, total);
    if (idx < rawLines.length) { doc.addPage(); pageNum++; firstPage = false; }
    else break;
  }

  if (rawLines.length === 0) { drawSubject(); drawFooter(1, 1); }
  return doc;
}

/* ═══════════════════════════════════════════════════════════════
   DOWNLOAD PDF
   ═══════════════════════════════════════════════════════════════ */
function generate() {
  const btn = document.getElementById('generatePdf');
  btn.disabled = true;
  btn.textContent = 'Generating…';
  setTimeout(() => {
    try {
      const doc = buildDoc();
      if (!doc) return;
      const safe = document.getElementById('title').value.trim()
        .replace(/[\\/:*?"<>|]/g, '').replace(/\s+/g, '_').trim() || 'converted';
      doc.save(safe + '.pdf');
    } finally {
      btn.disabled = false;
      btn.textContent = '↓ Download PDF';
    }
  }, 20);
}

/* ═══════════════════════════════════════════════════════════════
   LIVE PREVIEW
   ═══════════════════════════════════════════════════════════════ */
let previewTimer = null;

function runPreview() {
  clearTimeout(previewTimer);
  document.getElementById('liveDot').classList.remove('live');
  previewTimer = setTimeout(async () => {
    const doc = buildDoc();
    if (!doc) return;

    const scroll = document.getElementById('previewScroll');
    const total  = doc.internal.getNumberOfPages();
    document.getElementById('pageCount').textContent = total + (total === 1 ? ' page' : ' pages');
    scroll.querySelectorAll('.pdf-page-wrap').forEach(el => el.remove());
    document.getElementById('emptyState').style.display = 'none';

    if (window.pdfjsLib) {
      const buf = doc.output('arraybuffer');
      const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
      for (let i = 1; i <= pdf.numPages; i++) {
        const page     = await pdf.getPage(i);
        const viewport = page.getViewport({ scale: 2 });
        const canvas   = document.createElement('canvas');
        canvas.width   = viewport.width;
        canvas.height  = viewport.height;
        await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
        const wrap = document.createElement('div');
        wrap.className = 'pdf-page-wrap';
        scroll.appendChild(wrap);
        wrap.appendChild(canvas);
      }
    }
    document.getElementById('liveDot').classList.add('live');
  }, 350);
}

document.querySelectorAll('#title,#author,#subject,#keywords,#textInput,#leftMargin,#rightMargin,#topMargin,#fontSize')
  .forEach(el => el.addEventListener('input', runPreview));

/* ── Boot ── */
(function () {
  const s   = document.createElement('script');
  s.src     = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
  s.onload  = () => {
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    runPreview();
  };
  document.head.appendChild(s);
  loadTemplates();
  refreshSavedList();
})();
</script>
